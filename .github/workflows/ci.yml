name: CI
permissions:
  contents: read
  pull-requests: write

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: browser-actions/setup-chrome@v2
      - run: chrome --version

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies, lint and build
        run: |
          npm install
          npm run lint
          npm run ts-check
          npm run build-prod
          npm run a11y
        env:
          SKIP_BOOKS: true